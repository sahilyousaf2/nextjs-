name: NextJS Build

on: 
  push:
    branches: [ main ]

jobs:
  build-nextjs-app:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node JS
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build Nextjs App
        run: npm run build
