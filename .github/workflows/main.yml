name: NextjS Build

on: 
  push:
    branches: [ main ]

jobs:
  build-nextjs-app:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
      - name: Setup Node JS 
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22.x
      - name: Install Dependencies
        run: npm install
      - name: Build Nextjs App
        run: npm run build
